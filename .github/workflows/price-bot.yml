name: 🔄 SonarGold Price Bot

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Source to scrape: all / bajus / intl"
        required: false
        default: "all"
      force_fb_post:
        description: "Force FB post even if price unchanged (true/false)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Price scraper
  # ─────────────────────────────────────────────────────────────────────────────
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Chromium dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libasound2t64 libpango-1.0-0 libpangocairo-1.0-0 \
            fonts-liberation xdg-utils

      - name: Install npm dependencies
        run: npm ci --prefer-offline || npm install

      - name: Run price scraper
        run: |
          SOURCE="${{ github.event.inputs.source || 'all' }}"
          if [ "$SOURCE" = "all" ]; then
            node scraper.js
          else
            node scraper.js --source=$SOURCE
          fi

      - name: Show results
        run: |
          echo "=== latest.json ==="
          node -e "
            try {
              const d = require('./data/latest.json');
              console.log('bajus_ok:', d.bajus_ok, '| intl_ok:', d.intl_ok, '| fx_ok:', d.fx_ok);
              console.log('Gold 22K:', d.gold?.bajus_g22, 'BDT/g | XAU:', d.gold?.intl_usd_oz, 'USD/oz');
              console.log('Silver 22K:', d.silver?.bajus_s22, 'BDT/g | XAG:', d.silver?.intl_usd_oz, 'USD/oz');
            } catch(e) { console.log('(latest.json not found)'); }
          "

      - name: Configure git
        run: |
          git config user.name  "sonargold-bot"
          git config user.email "sonargold-bot@users.noreply.github.com"

      - name: Commit and push with retry
        run: |
          git add data/ logs/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          git commit -m "🔄 Update prices — $TIMESTAMP"

          for i in 1 2 3 4 5; do
            echo "Push attempt $i..."
            git stash --include-untracked || true
            git pull --rebase origin ${{ github.ref_name }}
            git stash pop || true
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "✅ Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push failed — retrying in 5s..."
            sleep 5
          done
          echo "❌ All push attempts failed"
          exit 1

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Facebook post (runs only after Job 1 succeeds)
  # ─────────────────────────────────────────────────────────────────────────────
  post-to-facebook:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: update-prices
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
      FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
      # Tell Puppeteer's postinstall to skip auto-downloading Chrome.
      # We install it explicitly ourselves below, after wiping any partial cache.
      PUPPETEER_SKIP_DOWNLOAD: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install system dependencies (Chromium + Bengali fonts)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libasound2t64 libpango-1.0-0 libpangocairo-1.0-0 \
            fonts-liberation xdg-utils \
            fonts-beng fonts-beng-extra \
            fonts-lohit-beng-bengali \
            fonts-noto-core
          sudo fc-cache -fv

      - name: Install npm dependencies
        # PUPPETEER_SKIP_DOWNLOAD=true (set in env above) prevents the
        # postinstall script from creating a partial/corrupt Chrome cache folder.
        # We then install Chrome cleanly ourselves in the next step.
        run: npm install

      - name: Install Chrome for Puppeteer (clean)
        # Wipe any partial cache that npm's postinstall may have left behind,
        # then do a fresh install so Puppeteer finds a complete Chrome binary.
        run: |
          rm -rf ~/.cache/puppeteer
          npx puppeteer browsers install chrome

      - name: Handle force FB post flag
        if: ${{ github.event.inputs.force_fb_post == 'true' }}
        run: |
          echo "⚡ Force post enabled — clearing last posted snapshot"
          rm -f data/fb_last_posted.json

      - name: Generate image & post to Facebook
        run: node fb-post.js

      - name: Configure git
        run: |
          git config user.name  "sonargold-bot"
          git config user.email "sonargold-bot@users.noreply.github.com"

      - name: Commit and push FB snapshot with retry
        run: |
          git add data/fb_last_posted.json
          if git diff --staged --quiet; then
            echo "No FB snapshot changes to commit"
            exit 0
          fi
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          git commit -m "📸 FB post snapshot — $TIMESTAMP"

          for i in 1 2 3 4 5; do
            echo "Push attempt $i..."
            git stash --include-untracked || true
            git pull --rebase origin ${{ github.ref_name }}
            git stash pop || true
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "✅ Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push failed — retrying in 5s..."
            sleep 5
          done
          echo "❌ All push attempts failed"
          exit 1
