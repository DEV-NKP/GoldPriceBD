name: 🔄 SonarGold Price Bot
on:
  schedule:
    # Every 4 hours UTC
    - cron: "0 0,4,8,12,16,20 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Source to scrape: all / bajus / intl"
        required: false
        default: "all"

# ✅ Required for push access
permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js 24
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      # 3. Install dependencies (no Chromium/puppeteer deps needed anymore!)
      - name: Install npm dependencies
        run: npm ci --prefer-offline || npm install

      # 4. Run scraper
      - name: Run price scraper
        run: |
          SOURCE="${{ github.event.inputs.source || 'all' }}"
          if [ "$SOURCE" = "all" ]; then
            node scraper.js
          else
            node scraper.js --source=$SOURCE
          fi

      # 5. Show results
      - name: Show results
        run: |
          echo "=== latest.json ==="
          node -e "
            try {
              const d = require('./data/latest.json');
              console.log('bajus_ok:', d.bajus_ok, '| bajus_source:', d.bajus_source, '| bajus_cached:', d.bajus_cached);
              console.log('intl_ok:', d.intl_ok, '| fx_ok:', d.fx_ok);
              console.log('Gold 22K:', d.gold?.bajus_g22, 'BDT/g (' + d.gold?.bajus_g22_vori + ' BDT/vori)');
              console.log('Silver 22K:', d.silver?.bajus_s22, 'BDT/g');
              console.log('XAU:', d.gold?.intl_usd_oz, 'USD/oz | XAG:', d.silver?.intl_usd_oz, 'USD/oz');
              console.log('Counts:', d.counts);
            } catch(e) {
              console.log('(latest.json not found or invalid)', e.message);
            }
          "
          echo ""
          echo "=== Last gold entry ==="
          node -e "
            try {
              const f = require('./data/gold_prices.json');
              console.log(JSON.stringify(f[f.length-1], null, 2));
            } catch(e) {
              console.log('(no gold file)');
            }
          "

      # 6. Commit changes
      - name: Commit changes
        run: |
          git config user.name  "sonargold-bot"
          git config user.email "sonargold-bot@users.noreply.github.com"
          git add data/ logs/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            BAJUS_OK=$(node -e "try{const d=require('./data/latest.json');console.log(d.bajus_ok?'✅':'⚠️')}catch{console.log('❓')}" 2>/dev/null)
            SOURCE=$(node -e "try{const d=require('./data/latest.json');console.log(d.bajus_source||'none')}catch{console.log('none')}" 2>/dev/null)
            git commit -m "🔄 Update prices — $TIMESTAMP $BAJUS_OK [$SOURCE]"
          fi

      # 7. Push changes
      - name: Push changes
        run: git push
